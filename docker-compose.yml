services:
  migrate:
    build: .
    command: python manage.py migrate --noinput
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    volumes:
      - media_data:/app/media
    ports:
      - "127.0.0.1:3023:8000"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    command: python manage.py process_tasks
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: medsos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2rT5KtV0K203MUFJOGrq12qhkB7p6apU
    # No host port published — reachable only from other containers on the
    # `medsos` compose project's internal network, isolated from
    # nalarin-postgres (the Prisma-managed database for the TS monorepo).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
